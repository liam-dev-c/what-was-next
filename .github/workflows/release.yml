name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    name: Tag & release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.next }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-tags: true

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Compute date-based tag
        id: version
        run: |
          set -euo pipefail
          date=$(date -u +%Y-%m-%d)
          # Nth release of the day: YYYY-MM-DD-N (N = today's tag count + 1).
          n=$(( $(git tag --list "$date-*" | wc -l) + 1 ))
          next="$date-$n"
          echo "Next tag: $next"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          if git rev-parse --verify --quiet "refs/tags/$NEXT"; then
            echo "::error::Tag $NEXT already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT" -m "Release $NEXT"
          git push origin "$NEXT"

      - name: Build release binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          # modernc.org/sqlite is pure Go, so CGO is not needed and we can
          # cross-compile every target from the Ubuntu runner.
          for os in darwin linux; do
            for arch in amd64 arm64; do
              out="dist/what-was-next-$os-$arch"
              echo "Building $out"
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
                go build -trimpath -ldflags "-s -w" -o "$out" .
            done
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          gh release create "$NEXT" --title "$NEXT" --generate-notes --verify-tag \
            dist/what-was-next-*

  bump-formula:
    name: Bump Homebrew formula
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout what-was-next (for the renderer script)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: src

      - name: Checkout tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: liam-dev-c/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'what-was-next-*' --dir dist

      - name: Render formula
        env:
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          REPO="$GITHUB_REPOSITORY" \
            src/scripts/render-formula.sh "$TAG" dist > tap/Formula/what-was-next.rb
          cat tap/Formula/what-was-next.rb

      - name: Commit and push
        env:
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/what-was-next.rb
          git commit -m "what-was-next ${TAG}" || { echo "no changes"; exit 0; }
          git push
