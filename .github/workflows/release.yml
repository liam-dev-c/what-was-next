name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Compute & push tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.next }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-tags: true

      - name: Compute date-based tag
        id: version
        run: |
          set -euo pipefail
          date=$(date -u +%Y-%m-%d)
          # Nth release of the day: YYYY-MM-DD-N (N = today's tag count + 1).
          n=$(( $(git tag --list "$date-*" | wc -l) + 1 ))
          next="$date-$n"
          echo "Next tag: $next"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          if git rev-parse --verify --quiet "refs/tags/$NEXT"; then
            echo "::error::Tag $NEXT already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT" -m "Release $NEXT"
          git push origin "$NEXT"

  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    needs: version
    runs-on: ubuntu-latest
    # One target per runner so the four cross-compiles happen in parallel
    # instead of sequentially. modernc.org/sqlite is slow to compile and each
    # GOOS/GOARCH is its own build-cache namespace, so serial builds paid that
    # cost four times over.
    strategy:
      matrix:
        os: [darwin, linux]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          # modernc.org/sqlite is pure Go, so CGO is not needed and we can
          # cross-compile every target from the Ubuntu runner.
          out="what-was-next-${GOOS}-${GOARCH}"
          echo "Building $out"
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "$out" .

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: what-was-next-${{ matrix.os }}-${{ matrix.arch }}
          path: what-was-next-${{ matrix.os }}-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create GitHub release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          pattern: what-was-next-*
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$NEXT" --repo "$GITHUB_REPOSITORY" \
            --title "$NEXT" --generate-notes --verify-tag \
            dist/what-was-next-*

  bump-formula:
    name: Bump Homebrew formula
    needs: [version, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout what-was-next (for the renderer script)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: src

      - name: Checkout tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: liam-dev-c/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'what-was-next-*' --dir dist

      - name: Render formula
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          REPO="$GITHUB_REPOSITORY" \
            src/scripts/render-formula.sh "$TAG" dist > tap/Formula/what-was-next.rb
          cat tap/Formula/what-was-next.rb

      - name: Commit and push
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/what-was-next.rb
          git commit -m "what-was-next ${TAG}" || { echo "no changes"; exit 0; }
          git push
